name: Repository compliance

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required files
        run: python scripts/validate_required_files.py

      - name: Validate scanner structure
        run: python scripts/validate_scanner_structure.py

      - name: Scan for private-source leaks
        env:
          PRIVATE_SOURCE_LEAK_TERMS_B64: ${{ secrets.PRIVATE_SOURCE_LEAK_TERMS_B64 }}
        run: python scripts/scan_repo_for_private_source_leaks.py

      - name: Scan for accusatory language
        run: python scripts/scan_repo_for_accusatory_language.py
